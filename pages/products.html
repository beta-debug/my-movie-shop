    <!-- Products Grid -->
    <section class="section">
        <div class="container">
            <div class="grid grid-3" id="productsGrid"></div>

    <script src="../js/main.js"></script>
    <script>
        async function renderAllProducts() {
            const products = getProducts();
            const grid = document.getElementById('productsGrid');
            if (!grid) return;

            if (products.length === 0) {
                grid.innerHTML = `
          <div style="grid-column:1/-1; text-align:center; padding: 4rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">📦</div>
            <h3>ยังไม่มีสินค้า</h3>
            <p class="text-muted">สินค้าจะแสดงที่นี่เมื่อแอดมินเพิ่มสินค้า</p>
          </div>`;
                return;
            }

            grid.innerHTML = products.map(p => renderProductCard(p, true)).join('');
            initAnimations();
        }

        const originalInit = initComponents;
        initComponents = async function () {
            await originalInit();
            renderAllProducts();
        };
    </script>
</body>
