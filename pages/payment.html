<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน - STREAMSHOP</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="page-header">
        <div class="container">
            <h1>💳 ชำระเงิน</h1>
            <p>เลือกช่องทางการชำระเงินที่สะดวก</p>
        </div>
    </div>

    <section class="section">
        <div class="container" style="max-width: 800px;">
            <!-- Order Summary -->
            <div class="admin-card" id="orderSummary">
                <div class="admin-card-header">
                    <h3>📦 สรุปคำสั่งซื้อ</h3>
                </div>
                <div id="orderDetails"></div>
            </div>

            <!-- Payment Methods -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h3>💰 ช่องทางการชำระเงิน</h3>
                </div>
                <div class="payment-methods" id="paymentMethods">
                    <!-- Filled by JS -->
                </div>
            </div>

            <!-- Upload Slip -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h3>📤 แจ้งชำระเงิน</h3>
                </div>
                <form onsubmit="confirmPayment(event)">
                    <div class="form-group">
                        <label class="form-label">อัพโหลดสลิปการโอนเงิน</label>
                        <input type="file" id="slipUpload" class="form-input" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">หมายเหตุ (ถ้ามี)</label>
                        <textarea class="form-input" id="paymentNote" placeholder="เช่น โอนเวลา 14:30"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">✅ ยืนยันการชำระเงิน</button>
                </form>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFlja2-S_3DvuTx5xsg-x94u4dXBTO_Hg",
            authDomain: "streamshop-f86a8.firebaseapp.com",
            databaseURL: "https://streamshop-f86a8-default-rtdb.asia-southeast1.firebasedatabase.app", // เพิ่มบรรทัดนี้
            projectId: "streamshop-f86a8",
            storageBucket: "streamshop-f86a8.firebasestorage.app",
            messagingSenderId: "5111966648",
            appId: "1:5111966648:web:df6896d1edf0401959bd4d",
            measurementId: "G-2TXXGSYLZL"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database(); 
    </script>

    <script src="../js/main.js"></script>
    <script>
        function renderPaymentPage() {
            const pending = JSON.parse(localStorage.getItem('ss_pendingOrder') || 'null');
            const orderDetails = document.getElementById('orderDetails');
            const paymentMethods = document.getElementById('paymentMethods');

            // Render order details
            if (pending) {
                orderDetails.innerHTML = `
          <div class="order-item" style="border: none; margin: 0; padding: 0;">
            <div class="order-info">
              <img src="${pending.productImage || '../images/package-1.svg'}" alt="${pending.productName}" class="order-img"
                   onerror="this.src='../images/package-1.svg'">
              <div class="order-details">
                <h4>${pending.productName}</h4>
                <p>สั่งโดย: ${pending.userName}</p>
              </div>
            </div>
            <div style="font-size: 1.5rem; font-weight: 800; color: var(--color-primary);">
              ฿${Number(pending.price).toLocaleString()}
            </div>
          </div>
        `;
            } else {
                orderDetails.innerHTML = `
          <div style="text-align: center; padding: 2rem;">
            <p class="text-muted">ไม่พบข้อมูลคำสั่งซื้อ</p>
            <a href="products.html" class="btn btn-primary mt-md">เลือกสินค้า</a>
          </div>`;
            }

            // Render payment methods
            const settings = getPaymentSettings();
            let methodsHTML = '';

            if (settings.qrCode) {
                methodsHTML += `
          <div class="payment-card">
            <h4 style="margin-bottom: 1rem;">📱 พร้อมเพย์ / QR Code</h4>
            <img src="${settings.qrCode}" alt="QR Code" style="max-width: 200px; border-radius: 8px;">
            <p class="text-muted mt-md">สแกน QR Code เพื่อชำระเงิน</p>
          </div>
        `;
            }

            if (settings.bankAccount) {
                methodsHTML += `
          <div class="payment-card">
            <h4 style="margin-bottom: 1rem;">🏦 โอนเงินผ่านธนาคาร</h4>
            <div style="background: var(--color-surface); padding: 1.5rem; border-radius: 8px; margin-top: 1rem;">
              <p style="font-size: 1.2rem; font-weight: 700; color: var(--color-text); letter-spacing: 2px;">
                ${settings.bankAccount}
              </p>
              ${settings.bankName ? `<p class="text-muted mt-sm">${settings.bankName}</p>` : ''}
              ${settings.accountName ? `<p class="text-muted mt-sm">ชื่อบัญชี: ${settings.accountName}</p>` : ''}
            </div>
          </div>
        `;
            }

            if (!methodsHTML) {
                methodsHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">⚙️</div>
            <p class="text-muted">แอดมินยังไม่ได้ตั้งค่าช่องทางการชำระเงิน</p>
            <p class="text-muted">กรุณาติดต่อแอดมินเพื่อสอบถามช่องทางชำระเงิน</p>
          </div>
        `;
            }

            paymentMethods.innerHTML = methodsHTML;
        }

        function confirmPayment(e) {
            e.preventDefault();
            const user = getCurrentUser();
            if (!user) {
                showToast('กรุณาเข้าสู่ระบบก่อน', 'error');
                return;
            }

            const pending = JSON.parse(localStorage.getItem('ss_pendingOrder') || 'null');
            if (!pending) {
                showToast('ไม่พบข้อมูลคำสั่งซื้อ', 'error');
                return;
            }

            // Create order
            addOrder({
                productId: pending.productId,
                productName: pending.productName,
                productImage: pending.productImage,
                price: pending.price,
                userId: user.id,
                userName: user.name,
                userEmail: user.email
            });

            localStorage.removeItem('ss_pendingOrder');
            showToast('ชำระเงินสำเร็จ! กรุณารอแอดมินยืนยัน 🎉', 'success');

            setTimeout(() => {
                window.location.href = 'history.html';
            }, 2000);
        }

        const originalInit = initComponents;
        initComponents = async function () {
            await originalInit();
            renderPaymentPage();
        };
    </script>
</body>

</html>
