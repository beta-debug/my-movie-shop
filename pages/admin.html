<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แอดมิน - STREAMSHOP</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        /* ซ่อมหน้าจอเละ - เพิ่มสไตล์เฉพาะหน้า Admin */
        .admin-layout { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; background: var(--color-bg-secondary); }
        .sidebar { background: var(--color-bg-primary); border-right: 1px solid var(--color-border); padding: 2rem 0; }
        .sidebar-item { padding: 1rem 1.5rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(229, 9, 20, 0.1); color: var(--color-primary); border-left: 4px solid var(--color-primary); }
        .admin-content { padding: 2rem; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: var(--shadow-sm); }
        .table th, .table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--color-border); }
        .table th { background: #f8f9fa; font-weight: 600; }
        .table-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        @media (max-width: 768px) { .admin-layout { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="admin-layout">
        <aside class="sidebar">
            <div style="padding: 0 1.5rem 1.5rem; border-bottom: 1px solid var(--color-border); margin-bottom: 1rem;">
                <h3 style="color: var(--color-primary);">⚙️ แอดมิน</h3>
            </div>
            <div class="sidebar-item active" onclick="switchSection('products')">📦 จัดการสินค้า</div>
            <div class="sidebar-item" onclick="switchSection('payment')">💳 ชำระเงิน</div>
            <div class="sidebar-item" style="color: var(--color-danger); margin-top: 2rem;" onclick="logout()">🚪 ออกจากระบบ</div>
        </aside>

        <main class="admin-content">
            <section id="productsSection" class="content-section active">
                <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>📦 รายการสินค้าออนไลน์ (<span id="productCount">0</span>)</h2>
                    <button class="btn btn-primary" onclick="openModal('productModal')">+ เพิ่มสินค้าใหม่</button>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>รูป</th>
                            <th>ชื่อสินค้า</th>
                            <th>ราคา</th>
                            <th>ป้าย</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody"></tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3>เพิ่ม/แก้ไขสินค้า</h3>
                <span class="modal-close" onclick="closeModal('productModal')">&times;</span>
            </div>
            <form id="adminProductForm" onsubmit="saveProductToFirebase(event)">
                <div class="form-group">
                    <label>ชื่อสินค้า</label>
                    <input type="text" id="pName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>ราคา</label>
                    <input type="number" id="pPrice" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>ป้ายกำกับ (เช่น ยอดนิยม)</label>
                    <input type="text" id="pBadge" class="form-control">
                </div>
                <div class="form-group">
                    <label>รายละเอียด</label>
                    <textarea id="pDesc" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label>รูปภาพ</label>
                    <input type="file" id="pImage" class="form-control" accept="image/*">
                    <div id="pPreview" style="margin-top: 10px;"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">บันทึกข้อมูลออนไลน์</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../js/main.js"></script>

    <script>
        // 1. ตั้งค่า Firebase เฉพาะหน้าแอดมิน
        const conf = {
            apiKey: "AIzaSyCFlja2-S_3DvuTx5xsg-x94u4dXBTO_Hg",
            authDomain: "streamshop-f86a8.firebaseapp.com",
            databaseURL: "https://streamshop-f86a8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "streamshop-f86a8"
        };
        if (!firebase.apps.length) firebase.initializeApp(conf);
        const rdb = firebase.database();

        let currentImgBase64 = "";

        // 2. จัดการรูปภาพ
        document.getElementById('pImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentImgBase64 = ev.target.result;
                    document.getElementById('pPreview').innerHTML = `<img src="${currentImgBase64}" style="width:100px; border-radius:4px;">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 3. ฟังก์ชันบันทึก (Firebase ตรง)
        async function saveProductToFirebase(e) {
            e.preventDefault();
            const newProduct = {
                name: document.getElementById('pName').value,
                price: Number(document.getElementById('pPrice').value),
                badge: document.getElementById('pBadge').value,
                description: document.getElementById('pDesc').value,
                image: currentImgBase64 || '',
                createdAt: new Date().toISOString()
            };

            try {
                await rdb.ref('products').push(newProduct);
                alert("เพิ่มสินค้าสำเร็จ!");
                closeModal('productModal');
                location.reload(); // รีโหลดเพื่ออัปเดตตาราง
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        // 4. แสดงตารางสินค้า
        async function loadAdminProducts() {
            const snapshot = await rdb.ref('products').once('value');
            const data = snapshot.val();
            const list = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            
            document.getElementById('productCount').textContent = list.length;
            const tbody = document.getElementById('productsTableBody');
            
            tbody.innerHTML = list.map(p => `
                <tr>
                    <td><img src="${p.image}" class="table-img"></td>
                    <td>${p.name}</td>
                    <td>฿${p.price}</td>
                    <td>${p.badge || '-'}</td>
                    <td>
                        <button onclick="deleteProduct('${p.id}')" class="btn btn-danger btn-sm">ลบ</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteProduct(id) {
            if (confirm('ลบสินค้านี้ใช่ไหม?')) {
                await rdb.ref(`products/${id}`).remove();
                location.reload();
            }
        }

        function switchSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + 'Section').classList.add('active');
        }

        // เริ่มต้น
        document.addEventListener('DOMContentLoaded', () => {
            loadAdminProducts();
            if (typeof initComponents === 'function') initComponents();
        });
    </script>
</body>
</html>
