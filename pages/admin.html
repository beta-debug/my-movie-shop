<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แอดมิน - STREAMSHOP</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="admin-layout">
        <aside class="sidebar" id="adminSidebar">
            <div style="padding: 0 1.5rem 1.5rem; border-bottom: 1px solid var(--color-border); margin-bottom: 1rem;">
                <h3 style="font-size: 1rem; color: var(--color-primary);">⚙️ แอดมิน</h3>
                <p style="font-size: 0.8rem; color: var(--color-text-muted);">จัดการระบบ</p>
            </div>
            <div class="sidebar-item active" onclick="switchSection('products')">
                <span class="icon">📦</span> เพิ่มออเดอร์สินค้า
            </div>
            <div class="sidebar-item" onclick="switchSection('payment')">
                <span class="icon">💳</span> ช่องทางชำระเงิน
            </div>
            <div class="sidebar-item" onclick="switchSection('orders')">
                <span class="icon">🛒</span> ออเดอร์ลูกค้า
            </div>
            <div class="sidebar-item" style="margin-top: auto; color: var(--color-danger);" onclick="logout()">
                <span class="icon">🚪</span> ออกจากระบบ
            </div>
        </aside>

        <main class="admin-content">
            <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.5rem; margin:0;" id="sectionTitle">การจัดการสินค้า</h1>
                <button class="btn btn-primary" id="sidebarToggle" style="display: none;">☰ เมนู</button>
            </div>

            <section id="productsSection" class="content-section active">
                <div class="card">
                    <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 style="font-size: 1.25rem; margin:0;">รายการแพ็คเกจ (<span id="productCount">0</span>)</h2>
                        <button class="btn btn-primary" onclick="openModal('productModal')">+ เพิ่มสินค้าใหม่</button>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>รูปภาพ</th>
                                    <th>ชื่อแพ็คเกจ</th>
                                    <th>ราคา</th>
                                    <th>ป้ายกำกับ</th>
                                    <th>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="paymentSection" class="content-section">
                <div class="card" style="max-width: 600px;">
                    <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem;">ตั้งค่าบัญชีรับเงิน</h2>
                    <form id="paymentForm" onsubmit="savePaymentSettings(event)">
                        <div class="form-group">
                            <label class="form-label">ชื่อบัญชี</label>
                            <input type="text" id="accName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">เลขที่บัญชี</label>
                            <input type="text" id="accNumber" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">ธนาคาร</label>
                            <input type="text" id="accBank" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">QR Code</label>
                            <input type="file" id="qrImage" class="form-control" accept="image/*">
                            <div id="qrPreview" style="margin-top: 1rem; max-width: 200px;"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">บันทึกข้อมูลชำระเงิน</button>
                    </form>
                </div>
            </section>

            <section id="ordersSection" class="content-section">
                <div class="card">
                    <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem;">รายการสั่งซื้อลูกค้า</h2>
                    <div style="overflow-x: auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>วันที่</th>
                                    <th>ลูกค้า</th>
                                    <th>แพ็คเกจ</th>
                                    <th>ยอดรวม</th>
                                    <th>สถานะ</th>
                                    <th>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="modalTitle">เพิ่มสินค้าใหม่</h3>
                <span class="modal-close" onclick="closeModal('productModal')">&times;</span>
            </div>
            <div class="modal-body">
                <form id="productForm" onsubmit="handleProductSubmit(event)">
                    <div class="form-group">
                        <label class="form-label">ชื่อแพ็คเกจ *</label>
                        <input type="text" id="productName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">ราคา (บาท) *</label>
                        <input type="number" id="productPrice" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">ป้ายกำกับ</label>
                        <input type="text" id="productBadge" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">รายละเอียด</label>
                        <textarea id="productDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">รูปภาพ</label>
                        <input type="file" id="productImage" class="form-control" accept="image/*">
                        <div id="imagePreview" style="margin-top: 1rem; max-width: 100%;"></div>
                    </div>
                    <div class="flex gap-md" style="justify-content: flex-end; margin-top: 2rem;">
                        <button type="button" class="btn btn-outline" onclick="closeModal('productModal')">ยกเลิก</button>
                        <button type="submit" class="btn btn-primary">บันทึกข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../js/main.js"></script>

    <script>
        // ใช้ config เดียวกับที่อยู่ในไฟล์ index.html ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyCFlja2-S_3DvuTx5xsg-x94u4dXBTO_Hg",
            authDomain: "streamshop-f86a8.firebaseapp.com",
            databaseURL: "https://streamshop-f86a8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "streamshop-f86a8"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentProductImage = "";
        let currentQrImage = "";

        // ฟังก์ชันเปลี่ยนเมนู (Code เดิม)
        function switchSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(sectionId + 'Section').classList.add('active');
            event.currentTarget.classList.add('active');
            
            const titles = { 'products': 'การจัดการสินค้า', 'payment': 'ตั้งค่าช่องทางชำระเงิน', 'orders': 'รายการสั่งซื้อ' };
            document.getElementById('sectionTitle').textContent = titles[sectionId];
        }

        // ระบบเพิ่มสินค้าลง Firebase
        async function handleProductSubmit(e) {
            e.preventDefault();
            const productData = {
                name: document.getElementById('productName').value,
                price: Number(document.getElementById('productPrice').value),
                badge: document.getElementById('productBadge').value,
                description: document.getElementById('productDescription').value,
                image: currentProductImage,
                createdAt: new Date().toISOString()
            };

            try {
                await db.ref('products').push(productData);
                alert("เพิ่มสินค้าสำเร็จ!");
                location.reload();
            } catch (err) { alert("Error: " + err.message); }
        }

        // ระบบแสดงผลตารางสินค้า
        async function renderProductsTable() {
            const snapshot = await db.ref('products').once('value');
            const data = snapshot.val();
            const tbody = document.getElementById('productsTableBody');
            if (!data) return;

            const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            document.getElementById('productCount').textContent = list.length;
            
            tbody.innerHTML = list.map(p => `
                <tr>
                    <td><img src="${p.image}" class="table-img" style="width:50px; height:50px; object-fit:cover;"></td>
                    <td>${p.name}</td>
                    <td>฿${p.price}</td>
                    <td>${p.badge || '-'}</td>
                    <td><button onclick="deleteProduct('${p.id}')" class="btn btn-danger btn-sm">ลบ</button></td>
                </tr>
            `).join('');
        }

        async function deleteProduct(id) {
            if (confirm('ลบสินค้านี้ใช่ไหม?')) {
                await db.ref(`products/${id}`).remove();
                location.reload();
            }
        }

        // จัดการรูปภาพ
        document.getElementById('productImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    currentProductImage = ev.target.result;
                    document.getElementById('imagePreview').innerHTML = `<img src="${currentProductImage}" style="max-width:100px;">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // UI Helpers
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { sessionStorage.clear(); window.location.href = '../index.html'; }

        // เริ่มต้น
        window.onload = async () => {
            if (sessionStorage.getItem('adminAuth') !== 'true') window.location.href = '../index.html';
            await renderProductsTable();
        };
    </script>
</body>
</html>
