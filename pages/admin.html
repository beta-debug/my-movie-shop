<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แอดมิน - STREAMSHOP</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="admin-layout">
        <aside class="sidebar" id="adminSidebar">
            <div style="padding: 0 1.5rem 1.5rem; border-bottom: 1px solid var(--color-border); margin-bottom: 1rem;">
                <h3 style="font-size: 1rem; color: var(--color-primary);">⚙️ แอดมิน</h3>
                <p style="font-size: 0.8rem; color: var(--color-text-muted);">จัดการระบบ</p>
            </div>
            <div class="sidebar-item active" onclick="switchSection('products')">
                <span class="icon">📦</span> เพิ่มออเดอร์สินค้า
            </div>
            <div class="sidebar-item" onclick="switchSection('payment')">
                <span class="icon">💳</span> ช่องทางชำระเงิน
            </div>
            <div class="sidebar-item" onclick="switchSection('orders')">
                <span class="icon">🛒</span> ออเดอร์ลูกค้า <span class="badge badge-primary"
                    style="margin-left:auto;">2</span>
            </div>
            <div class="sidebar-item" style="margin-top: auto; color: var(--color-danger);" onclick="logout()">
                <span class="icon">🚪</span> ออกจากระบบ
            </div>
        </aside>

        <main class="admin-content">
            <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.5rem; margin:0;" id="sectionTitle">การจัดการสินค้า</h1>
                <button class="btn btn-primary" id="sidebarToggle" style="display: none;">☰ เมนู</button>
            </div>

            <section id="productsSection" class="content-section active">
                <div class="card">
                    <div class="flex"
                        style="justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 style="font-size: 1.25rem; margin:0;">รายการแพ็คเกจ (<span id="productCount">0</span>)</h2>
                        <button class="btn btn-primary" onclick="openModal('productModal')">+ เพิ่มสินค้าใหม่</button>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>รูปภาพ</th>
                                    <th>ชื่อแพ็คเกจ</th>
                                    <th>ราคา</th>
                                    <th>ป้ายกำกับ</th>
                                    <th>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="paymentSection" class="content-section">
                <div class="card" style="max-width: 600px;">
                    <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem;">ตั้งค่าบัญชีรับเงิน</h2>
                    <form id="paymentForm" onsubmit="savePaymentSettings(event)">
                        <div class="form-group">
                            <label class="form-label">ชื่อบัญชี / ชื่อผู้รับเงิน</label>
                            <input type="text" id="accName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">เลขที่บัญชี / เบอร์พร้อมเพย์</label>
                            <input type="text" id="accNumber" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">ธนาคาร</label>
                            <input type="text" id="accBank" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">อัปโหลด QR Code รับเงิน</label>
                            <input type="file" id="qrImage" class="form-control" accept="image/*">
                            <div id="qrPreview" style="margin-top: 1rem; max-width: 200px;"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">บันทึกข้อมูลช่องทางชำระเงิน</button>
                    </form>
                </div>
            </section>

            <section id="ordersSection" class="content-section">
                <div class="card">
                    <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem;">รายการสั่งซื้อล่าสุด</h2>
                    <div style="overflow-x: auto;">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>วันที่</th>
                                    <th>ลูกค้า</th>
                                    <th>แพ็คเกจ</th>
                                    <th>ยอดรวม</th>
                                    <th>สถานะ</th>
                                    <th>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="modalTitle">เพิ่มสินค้าใหม่</h3>
                <span class="modal-close" onclick="closeModal('productModal')">&times;</span>
            </div>
            <div class="modal-body">
                <form id="productForm" onsubmit="handleAddProduct(event)">
                    <div class="form-group">
                        <label class="form-label">ชื่อแพ็คเกจ *</label>
                        <input type="text" id="productName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">ราคา (บาท) *</label>
                        <input type="number" id="productPrice" class="form-control" required min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">ป้ายกำกับ (เช่น ยอดนิยม, แนะนำ)</label>
                        <input type="text" id="productBadge" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">รายละเอียด</label>
                        <textarea id="productDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">รูปภาพประกอบ</label>
                        <input type="file" id="productImage" class="form-control" accept="image/*">
                        <div id="imagePreview" style="margin-top: 1rem; max-width: 100%;"></div>
                    </div>
                    <div class="flex gap-md" style="justify-content: flex-end; margin-top: 2rem;">
                        <button type="button" class="btn btn-outline"
                            onclick="closeModal('productModal')">ยกเลิก</button>
                        <button type="submit" class="btn btn-primary">บันทึกข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFlja2-S_3DvuTx5xsg-x94u4dXBTO_Hg",
            authDomain: "streamshop-f86a8.firebaseapp.com",
            databaseURL: "https://streamshop-f86a8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "streamshop-f86a8",
            storageBucket: "streamshop-f86a8.firebasestorage.app",
            messagingSenderId: "5111966648",
            appId: "1:5111966648:web:df6896d1edf0401959bd4d",
            measurementId: "G-2TXXGSYLZL"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
    </script>

    <script src="../js/main.js"></script>

    <script>
        // Check Auth
        function checkAdmin() {
            const isAuth = sessionStorage.getItem('adminAuth');
            if (!isAuth) {
                window.location.href = '../index.html';
                return false;
            }
            return true;
        }

        function logout() {
            sessionStorage.removeItem('adminAuth');
            window.location.href = '../index.html';
        }

        // Section Switching
        function switchSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));

            document.getElementById(sectionId + 'Section').classList.add('active');
            event.currentTarget.classList.add('active');

            const titles = {
                'products': 'การจัดการสินค้า',
                'payment': 'ตั้งค่าช่องทางชำระเงิน',
                'orders': 'จัดการออเดอร์'
            };
            document.getElementById('sectionTitle').textContent = titles[sectionId];
        }

        // Modal Logic
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
            if (modalId === 'productModal' && !currentEditingId) {
                resetProductForm();
                document.getElementById('modalTitle').textContent = 'เพิ่มสินค้าใหม่';
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            if (modalId === 'productModal') {
                resetProductForm();
            }
        }

        let productImageData = null;
        let currentEditingId = null;
        let currentQrImage = null;
        let adminProductsList = []; // เก็บข้อมูลสินค้าไว้เพื่อดึงมาแก้ไขง่ายๆ

        function resetProductForm() {
            document.getElementById('productForm').reset();
            document.getElementById('imagePreview').innerHTML = '';
            productImageData = null;
            currentEditingId = null;
        }

        // ==========================================
        // ระบบดึงข้อมูลจาก FIREBASE
        // ==========================================
        async function renderProductsTable() {
            try {
                // ดึงข้อมูลจาก Google ทันที
                const snapshot = await db.ref('products').once('value');
                const data = snapshot.val();

                // แปลงข้อมูลเป็น Array
                adminProductsList = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];

                const tbody = document.getElementById('productsTableBody');
                const count = document.getElementById('productCount');
                if (!tbody) return;

                count.textContent = adminProductsList.length;

                if (adminProductsList.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 2rem; color: var(--color-text-muted);">ยังไม่มีสินค้าในระบบ</td></tr>`;
                    return;
                }

                tbody.innerHTML = adminProductsList.map(p => `
                    <tr>
                        <td><img src="${p.image || 'https://via.placeholder.com/60'}" class="table-img" onerror="this.style.display='none'"></td>
                        <td><strong>${p.name}</strong><br><span style="font-size:0.75rem; color:var(--color-text-muted);">${(p.description || '').substring(0, 50)}...</span></td>
                        <td style="color: var(--color-primary); font-weight: 700;">฿${Number(p.price).toLocaleString()}</td>
                        <td>${p.badge ? `<span class="badge badge-primary">${p.badge}</span>` : '-'}</td>
                        <td>
                            <div class="flex gap-sm">
                                <button type="button" class="btn btn-outline btn-sm" onclick="openEditProduct('${p.id}')">✏️ แก้ไข</button>
                                <button type="button" class="btn btn-danger btn-sm" onclick="handleDeleteProduct('${p.id}')">🗑️ ลบ</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Error loading products:", error);
            }
        }

        // ==========================================
        // ระบบเพิ่มและแก้ไขสินค้า (ส่งขึ้น FIREBASE)
        // ==========================================
        async function handleAddProduct(e) {
            e.preventDefault();

            const product = {
                name: document.getElementById('productName').value.trim(),
                price: Number(document.getElementById('productPrice').value),
                description: document.getElementById('productDescription').value.trim(),
                badge: document.getElementById('productBadge').value.trim(),
                image: productImageData || '',
                updatedAt: new Date().toISOString()
            };

            try {
                if (currentEditingId) {
                    // อัปเดตของเดิม
                    await db.ref(`products/${currentEditingId}`).update(product);
                    showToast('อัปเดตสินค้าเรียบร้อย', 'success');
                } else {
                    // เพิ่มของใหม่
                    product.createdAt = new Date().toISOString();
                    await db.ref('products').push(product);
                    showToast('เพิ่มสินค้าออนไลน์เรียบร้อย', 'success');
                }

                closeModal('productModal');
                await renderProductsTable(); // โหลดข้อมูลใหม่
            } catch (error) {
                console.error("Error saving product:", error);
                showToast('เกิดข้อผิดพลาดในการบันทึก', 'error');
            }
        }

        function openEditProduct(id) {
            const product = adminProductsList.find(p => p.id === id);
            if (!product) return;

            document.getElementById('productName').value = product.name;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productDescription').value = product.description;
            document.getElementById('productBadge').value = product.badge || '';

            if (product.image) {
                productImageData = product.image;
                document.getElementById('imagePreview').innerHTML = `<img src="${product.image}" style="max-width: 100%; border-radius: 8px;">`;
            } else {
                productImageData = null;
                document.getElementById('imagePreview').innerHTML = '';
            }

            currentEditingId = id;
            document.getElementById('modalTitle').textContent = 'แก้ไขสินค้า';
            openModal('productModal');
        }

        // ==========================================
        // ระบบลบสินค้า (ลบจาก FIREBASE)
        // ==========================================
        async function handleDeleteProduct(id) {
            if (confirm('ยืนยันการลบสินค้านี้ออกจากระบบออนไลน์?')) {
                try {
                    await db.ref(`products/${id}`).remove();
                    showToast('ลบสินค้าเรียบร้อย', 'success');
                    await renderProductsTable();
                } catch (error) {
                    showToast('ลบสินค้าไม่สำเร็จ', 'error');
                }
            }
        }

        // Image Uploads Setup
        function setupImageUploads() {
            document.getElementById('productImage').addEventListener('change', function () {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}" style="max-width: 100%; border-radius: 8px;">`;
                        productImageData = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('qrImage').addEventListener('change', function () {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        document.getElementById('qrPreview').innerHTML = `<img src="${e.target.result}" alt="QR" style="max-width: 100%; border-radius: 8px;">`;
                        currentQrImage = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // Responsive Sidebar
        function setupResponsive() {
            const toggleBtn = document.getElementById('sidebarToggle');
            if (window.innerWidth <= 768) {
                toggleBtn.style.display = 'inline-flex';
            }
            window.addEventListener('resize', () => {
                toggleBtn.style.display = window.innerWidth <= 768 ? 'inline-flex' : 'none';
            });
        }

        // MOCK FUNCTIONS สำหรับ Payment & Orders (ยังเป็น LocalStorage เหมือนเดิม)
        function loadPaymentSettings() {
            const saved = localStorage.getItem('paymentSettings');
            if (saved) {
                const parsed = JSON.parse(saved);
                document.getElementById('accName').value = parsed.accName || '';
                document.getElementById('accNumber').value = parsed.accNumber || '';
                document.getElementById('accBank').value = parsed.accBank || '';
                if (parsed.qrImage) {
                    document.getElementById('qrPreview').innerHTML = `<img src="${parsed.qrImage}" style="max-width: 100%; border-radius: 8px;">`;
                    currentQrImage = parsed.qrImage;
                }
            }
        }

        function savePaymentSettings(e) {
            e.preventDefault();
            const settings = {
                accName: document.getElementById('accName').value,
                accNumber: document.getElementById('accNumber').value,
                accBank: document.getElementById('accBank').value,
                qrImage: currentQrImage
            };
            localStorage.setItem('paymentSettings', JSON.stringify(settings));
            showToast('บันทึกการตั้งค่าชำระเงินเรียบร้อย', 'success');
        }

        function renderCustomerOrders() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const tbody = document.getElementById('ordersTableBody');
            if (!tbody) return;

            if (orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 2rem;">ยังไม่มีออเดอร์</td></tr>`;
                return;
            }

            tbody.innerHTML = orders.map(o => `
                <tr>
                    <td>${new Date(o.createdAt).toLocaleString('th-TH')}</td>
                    <td><strong>${o.customerName}</strong><br><small>${o.customerLineId || ''}</small></td>
                    <td>${o.productName}</td>
                    <td style="color:var(--color-primary); font-weight:bold;">฿${o.totalPrice}</td>
                    <td><span class="badge ${o.status === 'รอตรวจสอบ' ? 'badge-primary' : 'badge-success'}">${o.status}</span></td>
                    <td><button class="btn btn-outline btn-sm">รายละเอียด</button></td>
                </tr>
            `).join('');
        }

        // ===== Init =====
        const originalInit = initComponents;
        initComponents = async function () {
            await originalInit();

            if (!checkAdmin()) return;

            setupImageUploads();
            setupResponsive();

            // รอโหลดข้อมูลตารางสินค้าจากออนไลน์
            await renderProductsTable();

            loadPaymentSettings();
            renderCustomerOrders();
        };
    </script>
</body>

</html>
