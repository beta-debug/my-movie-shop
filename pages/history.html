<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการสั่งซื้อ - STREAMSHOP</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="page-header">
        <div class="container">
            <h1>📋 ประวัติการสั่งซื้อ</h1>
            <p>ออเดอร์ทั้งหมดของคุณ</p>
        </div>
    </div>

    <section class="section">
        <div class="container" style="max-width: 800px;">
            <div id="ordersContainer"></div>
        </div>
    </section>

    <!-- Credentials Modal -->
    <div class="modal-backdrop" id="credentialsModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">🔑 ข้อมูลเข้าสู่ระบบ</h3>
                <button class="modal-close" onclick="closeModal('credentialsModal')">&times;</button>
            </div>
            <div id="credentialsContent">
                <div class="form-group">
                    <label class="form-label">อีเมล</label>
                    <div class="form-input" id="credEmail"
                        style="background: var(--color-bg); user-select: all; cursor: text;">-</div>
                </div>
                <div class="form-group">
                    <label class="form-label">รหัสผ่าน</label>
                    <div class="form-input" id="credPassword"
                        style="background: var(--color-bg); user-select: all; cursor: text;">-</div>
                </div>
                <p class="text-muted" style="font-size: 0.8rem; text-align: center; margin-top: 1rem;">
                    ℹ️ ข้อมูลนี้ส่งมาจากแอดมิน กรุณาเก็บรักษาไว้เป็นความลับ
                </p>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFlja2-S_3DvuTx5xsg-x94u4dXBTO_Hg",
            authDomain: "streamshop-f86a8.firebaseapp.com",
            databaseURL: "https://streamshop-f86a8-default-rtdb.asia-southeast1.firebasedatabase.app", // เพิ่มบรรทัดนี้
            projectId: "streamshop-f86a8",
            storageBucket: "streamshop-f86a8.firebasestorage.app",
            messagingSenderId: "5111966648",
            appId: "1:5111966648:web:df6896d1edf0401959bd4d",
            measurementId: "G-2TXXGSYLZL"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database(); 
    </script>>
    <script>
        function renderOrders() {
            const user = getCurrentUser();
            const container = document.getElementById('ordersContainer');
            if (!container) return;

            if (!user || user.isAdmin) {
                container.innerHTML = `
          <div style="text-align: center; padding: 4rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🔒</div>
            <h3>กรุณาเข้าสู่ระบบ</h3>
            <p class="text-muted mb-lg">คุณต้องเข้าสู่ระบบเพื่อดูประวัติการสั่งซื้อ</p>
            <button class="btn btn-primary" onclick="openModal('loginModal')">เข้าสู่ระบบ</button>
          </div>`;
                return;
            }

            const orders = getUserOrders(user.id);

            if (orders.length === 0) {
                container.innerHTML = `
          <div style="text-align: center; padding: 4rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">📭</div>
            <h3>ยังไม่มีออเดอร์</h3>
            <p class="text-muted mb-lg">คุณยังไม่ได้สั่งซื้อสินค้า</p>
            <a href="products.html" class="btn btn-primary">เลือกซื้อสินค้า</a>
          </div>`;
                return;
            }

            container.innerHTML = orders.map(order => {
                const statusColors = {
                    pending: 'badge-warning',
                    completed: 'badge-success'
                };
                const statusText = {
                    pending: '⏳ รอดำเนินการ',
                    completed: '✅ สำเร็จ'
                };

                return `
          <div class="order-item">
            <div class="order-info">
              <img src="${order.productImage || '../images/package-1.svg'}" alt="${order.productName}" class="order-img"
                   onerror="this.src='../images/package-1.svg'">
              <div class="order-details">
                <h4>${order.productName}</h4>
                <p class="text-muted">฿${Number(order.price).toLocaleString()} • ${new Date(order.createdAt).toLocaleDateString('th-TH')}</p>
                <span class="badge ${statusColors[order.status] || 'badge-warning'}">${statusText[order.status] || order.status}</span>
              </div>
            </div>
            <div class="menu-dots" onclick="showCredentials('${order.id}')" title="ดูข้อมูลเข้าสู่ระบบ">☰</div>
          </div>
        `;
            }).join('');
        }

        function showCredentials(orderId) {
            const orders = getOrders();
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            const emailEl = document.getElementById('credEmail');
            const passwordEl = document.getElementById('credPassword');

            if (order.credentials) {
                emailEl.textContent = order.credentials.email;
                passwordEl.textContent = order.credentials.password;
            } else {
                emailEl.textContent = 'ยังไม่ได้รับข้อมูล';
                passwordEl.textContent = 'กรุณารอแอดมินส่งข้อมูล';
            }

            openModal('credentialsModal');
        }

        const originalInit = initComponents;
        initComponents = async function () {
            await originalInit();
            renderOrders();
        };
    </script>
</body>

</html>
