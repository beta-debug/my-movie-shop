<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Store - ร้านขายแอปดูหนัง</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #141414; --card: #1f1f1f; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Kanit', sans-serif; margin: 0; }
        nav { background: #000; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--primary); font-size: 1.5rem; font-weight: bold; }
        .hero { height: 400px; background: linear-gradient(to bottom, rgba(0,0,0,0), var(--bg)), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=1200&q=80'); background-size: cover; display: flex; align-items: center; justify-content: center; text-align: center; }
        .container { padding: 2rem 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; transition: 0.3s; border: 1px solid #333; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 15px; }
        .price { color: var(--primary); font-size: 1.2rem; font-weight: bold; }
        .btn-buy { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-family: 'Kanit'; margin-top: 10px; }
        .btn-history { background: #333; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">MOVIE STORE</div>
        <div>
            <a href="history.html" class="btn-history">ประวัติการซื้อ</a>
            <a href="admin.html" style="color: gray; font-size: 0.7rem; margin-left: 10px;">Admin</a>
        </div>
    </nav>

    <div class="hero">
        <div>
            <h1>ดูหนังพรีเมียม ราคาหลักสิบ</h1>
            <p>รับประกันตลอดอายุการใช้งาน บริการ 24 ชม.</p>
        </div>
    </div>

    <div class="container" id="product-list">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=500" alt="Netflix">
            <div class="card-body">
                <h3>Netflix VIP 30 วัน</h3>
                <p>แชร์จอ 4K UHD ลื่นๆ ไม่สะดุด</p>
                <div class="price">฿59</div>
                <button class="btn-buy" onclick="alert('กรุณาแจ้งชำระเงินที่ Line: @yourid')">ซื้อเลย</button>
            </div>
        </div>
    </div>
</body>
</html>
