<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการระบบ - MOVIEPRIME</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body { background: #000; color: #fff; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #111; border-right: 1px solid #222; padding: 20px; position: fixed; height: 100%; }
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        .sidebar-item { padding: 12px 20px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; color: #aaa; }
        .sidebar-item:hover, .sidebar-item.active { background: #e50914; color: #fff; }
        .admin-card { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .order-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .three-dots { cursor: pointer; font-size: 24px; padding: 5px 15px; border-radius: 5px; transition: 0.2s; }
        .three-dots:hover { background: #333; }
        input, textarea { background: #222 !important; border: 1px solid #333 !important; color: #fff !important; margin-bottom: 15px; }
        .btn-send { background: #e50914; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <h2 style="color: #e50914; margin-bottom: 30px;">MOVIEPRIME</h2>
            <div class="sidebar-item active" onclick="showTab('add-order')">📦 เพิ่มออเดอร์สินค้า</div>
            <div class="sidebar-item" onclick="showTab('payments')">💳 ช่องทางชำระเงิน</div>
            <div class="sidebar-item" onclick="showTab('send-creds')">📧 ส่งอีเมลและรหัสผ่าน</div>
        </aside>

        <main class="main-content">
            <section id="send-creds" style="display:none;">
                <h1 style="margin-bottom: 20px;">📧 ส่งข้อมูลให้ลูกค้า</h1>
                <div class="admin-card">
                    <div class="order-row">
                        <div>
                            <strong>ออเดอร์ #6789</strong><br>
                            <small style="color:#888">ลูกค้า: customer@email.com (Netflix VIP)</small>
                        </div>
                        <div class="three-dots" onclick="openCredModal('customer@email.com')">☰</div>
                    </div>
                </div>
            </section>

            <section id="add-order">
                <h1 style="margin-bottom: 20px;">📦 เพิ่มสินค้าลงหน้าเว็บ</h1>
                <div class="admin-card" style="max-width: 600px;">
                    <label>ชื่อสินค้า</label>
                    <input type="text" class="form-control" placeholder="เช่น Netflix 4K 30 วัน">
                    <label>ราคา (บาท)</label>
                    <input type="number" class="form-control" placeholder="150">
                    <label>รายละเอียด</label>
                    <textarea class="form-control" rows="4"></textarea>
                    <button class="btn-send">ยืนยันเพิ่มสินค้า</button>
                </div>
            </section>
        </main>
    </div>

    <div id="credModal" class="modal-backdrop" style="display:none;">
        <div class="modal" style="background: #181818; border: 1px solid #333; max-width: 400px; padding: 30px; border-radius: 15px; position: relative; margin: 100px auto;">
            <h3 style="color: #e50914; margin-bottom: 20px;">กรอกข้อมูลส่งให้ลูกค้า</h3>
            <input type="text" id="targetEmail" class="form-control" readonly style="background: #111 !important;">
            <input type="text" id="accEmail" class="form-control" placeholder="อีเมลสำหรับล็อกอินแอป">
            <input type="text" id="accPass" class="form-control" placeholder="รหัสผ่านแอป">
            <button class="btn-send" onclick="alert('ส่งข้อมูลสำเร็จ!')">กดส่งรหัส</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#aaa; margin-top:15px; cursor:pointer; width:100%;">ยกเลิก</button>
        </div>
    </div>

    <script>
        function showTab(tabId) {
            document.getElementById('add-order').style.display = tabId === 'add-order' ? 'block' : 'none';
            document.getElementById('send-creds').style.display = tabId === 'send-creds' ? 'block' : 'none';
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
        function openCredModal(email) {
            document.getElementById('targetEmail').value = "ส่งหา: " + email;
            document.getElementById('credModal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('credModal').style.display = 'none';
        }
    </script>
</body>
</html>
