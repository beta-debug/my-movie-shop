/* ========================================
   Design Tokens - Netflix Theme
   ======================================== */
:root {
  /* Colors - Primary */
  --color-primary: #e50914;
  --color-primary-hover: #f40612;
  --color-primary-dark: #b20710;
  --color-primary-light: #ff3d47;

  /* Colors - Neutral */
  --color-bg: #141414;
  --color-bg-secondary: #1a1a2e;
  --color-bg-card: #1e1e2f;
  --color-bg-card-hover: #252540;
  --color-bg-overlay: rgba(0, 0, 0, 0.75);
  --color-bg-modal: rgba(0, 0, 0, 0.85);
  --color-surface: #222236;
  --color-surface-hover: #2a2a45;
  --color-border: #333355;
  --color-border-light: #444466;

  /* Colors - Text */
  --color-text: #ffffff;
  --color-text-secondary: #b3b3b3;
  --color-text-muted: #808080;
  --color-text-dark: #141414;

  /* Colors - Status */
  --color-success: #2ecc71;
  --color-warning: #f39c12;
  --color-danger: #e74c3c;
  --color-info: #3498db;

  /* Colors - Accent */
  --color-gold: #ffd700;
  --color-gradient-start: #e50914;
  --color-gradient-end: #b20710;

  /* Typography */
  --font-primary: 'Inter', 'Kanit', sans-serif;
  --font-heading: 'Inter', 'Kanit', sans-serif;

  --font-size-xs: 0.75rem;
  --font-size-sm: 0.875rem;
  --font-size-base: 1rem;
  --font-size-md: 1.125rem;
  --font-size-lg: 1.25rem;
  --font-size-xl: 1.5rem;
  --font-size-2xl: 2rem;
  --font-size-3xl: 2.5rem;
  --font-size-4xl: 3.5rem;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  --font-weight-extrabold: 800;

  --line-height-tight: 1.2;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* Spacing */
  --space-xs: 0.25rem;
  --space-sm: 0.5rem;
  --space-md: 1rem;
  --space-lg: 1.5rem;
  --space-xl: 2rem;
  --space-2xl: 3rem;
  --space-3xl: 4rem;
  --space-4xl: 6rem;

  /* Border Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Shadows */
  --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
  --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.6);
  --shadow-glow: 0 0 20px rgba(229, 9, 20, 0.3);
  --shadow-glow-strong: 0 0 40px rgba(229, 9, 20, 0.5);

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-base: 300ms ease;
  --transition-slow: 500ms ease;
  --transition-bounce: 300ms cubic-bezier(0.68, -0.55, 0.265, 1.55);

  /* Z-index */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-modal-backdrop: 900;
  --z-modal: 1000;
  --z-toast: 1100;

  /* Container */
  --container-max: 1200px;
  --container-padding: 1.5rem;

  /* Sidebar */
  --sidebar-width: 280px;
}
